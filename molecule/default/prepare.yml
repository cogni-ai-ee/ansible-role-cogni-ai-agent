---
- name: Prepare hosts
  hosts: all:!nixos*
  gather_facts: false
  tasks:
    - name: Install Python for Ansible
      ansible.builtin.raw: |
        if command -v python3 || command -v python; then
          exit 0
        elif command -v apk; then
          apk update -q && apk add -q --no-cache python3 py3-pip py3-packaging
        elif command -v apt; then
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq && apt-get install -yqq -o Dpkg::Use-Pty=0 python3 python3-pip python3-packaging
        elif command -v dnf; then
          dnf install -yq python3 python3-pip python3-packaging
        elif command -v zypper; then
          zypper -q --non-interactive install python3 python3-pip python3-packaging
        else
          echo "No supported package manager found" >&2
          exit 1
        fi
      changed_when: false
      no_log: "{{ ansible_verbosity | default(0) < 1 }}"
- name: Prepare NixOS hosts
  hosts: nixos*
  gather_facts: false
  tasks:
    - name: Install Python for Ansible on NixOS
      ansible.builtin.raw: |
        if command -v python3 || command -v python; then
          exit 0
        fi
        mkdir -p /etc/nix
        printf "sandbox = false\n" > /etc/nix/nix.conf
        export NIX_CONFIG="sandbox = false"
        nix-env --option sandbox false \
          -iA nixpkgs.python3 \
          -iA nixpkgs.python3Packages.pip \
          -iA nixpkgs.python3Packages.packaging > /dev/null
      changed_when: false
      no_log: "{{ ansible_verbosity | default(0) < 1 }}"
