---
- name: Verify
  hosts: all
  vars_files:
    - ../../defaults/main.yml
  tasks:
    - name: Test ai_inference_chat in check mode with complex messages
      cogni_ai.github_models.ai_inference_chat:
        system_prompt: You are a helpful assistant
        messages:
          - role: user
            content: What is the capital of France?
          - role: assistant
            content: The capital of France is Paris.
        prompt: And Germany?
      check_mode: true
      register: result_check
    - name: Verify check mode result structure and order
      ansible.builtin.assert:
        that:
          - result_check.messages | length == 4
          - result_check.messages[0].role == 'system'
          - result_check.messages[0].content == 'You are a helpful assistant'
          - result_check.messages[1].content == 'What is the capital of France?'
          - result_check.messages[2].role == 'assistant'
          - result_check.messages[3].role == 'user'
          - result_check.messages[3].content == 'And Germany?'
          - 'result_check.msg == "Check mode: no request sent"'
    - name: Set GH Models token fact
      ansible.builtin.set_fact:
        gh_models_token: "{{ lookup('env', 'GH_MODELS_TOKEN') }}"
    - name: Skip AI test if GH_MODELS_TOKEN is not set
      ansible.builtin.debug:
        msg: "Skipping real AI tests. To execute real tests, set the GH_MODELS_TOKEN environment variable with a PAT that has access to GitHub Models."
      when: gh_models_token | length == 0 or gh_models_token == '${GH_MODELS_TOKEN}'
    - name: Test ai_inference_chat with actual call (expects GH_MODELS_TOKEN)
      block:
        - name: Call AI API
          cogni_ai.github_models.ai_inference_chat:
            prompt: Hello, this is an automated test. Please respond with 'OK'.
            token: "{{ gh_models_token }}"
          register: result_call
          async: 60
          poll: 5
        - name: Verify call response
          ansible.builtin.assert:
            that:
              - result_call.message is defined
              - result_call.message | length > 0
      when:
        - gh_models_token | length > 0
        - gh_models_token != '${GH_MODELS_TOKEN}'
