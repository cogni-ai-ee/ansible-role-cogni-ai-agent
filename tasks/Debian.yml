---
- name: Apt cleanup ({{ ansible_facts['os_family'] }})
  become: "{{ (ansible_facts['user_id'] | default('root') != 'root') or (lookup('env', 'UID') | int != 0) }}"
  block:
    - name: Removes dependencies that are no longer required
      ansible.builtin.apt:
        autoremove: true
        purge: true
        dpkg_options: 'force-confdef,force-confold'
      no_log: "{{ ansible_verbosity | default(0) < 1 }}"
    - name: Cleans Apt cache
      ansible.builtin.apt:
        autoclean: true
        clean: true
        dpkg_options: 'force-confdef,force-confold'
      no_log: "{{ ansible_verbosity | default(0) < 1 }}"
