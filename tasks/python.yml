---
- name: Install Python pip (Alpine)
  ansible.builtin.package:
    name: py3-pip
    state: present
  when: ansible_distribution == 'Alpine'

- name: Install Python pip (Debian/Ubuntu)
  ansible.builtin.package:
    name: python3-pip
    state: present
  when: ansible_os_family == 'Debian'

- name: Install azure-ai-inference pip package
  ansible.builtin.pip:
    name: azure-ai-inference
    state: present
    break_system_packages: true
  when: ansible_distribution != 'NixOS'
